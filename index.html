<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OYDER Oyuncak Teklif Aracı</title>
<style>
  :root {
    --sari: #FFC000;
    --sari-kenar: #BA7517;
    --sari-yazi: #412402;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
    padding: 24px;
    background: #f4f4f4;
    color: #222;
  }
  .kapsayici { max-width: 1000px; margin: 0 auto; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .altbaslik { color: #666; font-size: 13px; margin: 0 0 20px; }
  .kart {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 18px;
    margin-bottom: 18px;
  }
  .kart h2 { font-size: 15px; margin: 0 0 12px; color: #333; }

  /* Üst ayarlar */
  .ayarlar { display: flex; flex-wrap: wrap; gap: 18px; align-items: flex-end; }
  .alan { display: flex; flex-direction: column; gap: 4px; }
  .alan label { font-size: 12px; color: #555; font-weight: 600; }
  .alan input {
    padding: 7px 9px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 14px;
    width: 130px;
  }

  /* Analiz listesi */
  table.liste { width: 100%; border-collapse: collapse; }
  table.liste th, table.liste td {
    padding: 7px 9px;
    border-bottom: 1px solid #eee;
    text-align: left;
    font-size: 13px;
  }
  table.liste th { background: #fafafa; font-weight: 600; color: #555; }
  table.liste td.sag, table.liste th.sag { text-align: right; }
  table.liste input[type="number"] {
    width: 70px;
    padding: 5px 6px;
    border: 1px solid #ccc;
    border-radius: 5px;
    text-align: right;
    font-size: 13px;
  }
  table.liste input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
  .satir-pasif { color: #aaa; }

  /* Düzenlenebilir alanlar */
  .duz-alan { display: flex; flex-direction: column; gap: 4px; }
  .duz-alan label { font-size: 12px; color: #555; font-weight: 600; }
  .duz-alan input {
    padding: 7px 9px; border: 1px solid #ccc; border-radius: 5px; font-size: 13px;
  }
  .duz-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

  /* Butonlar */
  .butonlar { display: flex; gap: 10px; flex-wrap: wrap; }
  button {
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-ana { background: var(--sari); color: var(--sari-yazi); border: 1px solid var(--sari-kenar); }
  .btn-ana:hover { background: #e6ad00; }
  .btn-ikincil { background: #eee; color: #444; }
  .btn-ikincil:hover { background: #ddd; }
  .uyari { color: #2e7d32; font-size: 13px; margin-left: 8px; align-self: center; }

  /* Teklif tablosu (müşteri standardı) */
  .onizleme-kapsayici { overflow-x: auto; }
  table.teklif { border-collapse: collapse; width: 100%; font-family: "Segoe UI", Arial, sans-serif; }
  table.teklif th, table.teklif td {
    border: 1px solid var(--sari-kenar);
    padding: 8px 10px;
    font-size: 13px;
    vertical-align: top;
  }
  table.teklif th {
    background: var(--sari);
    color: var(--sari-yazi);
    font-weight: bold;
    text-align: center;
  }
  table.teklif td.fiyat { text-align: right; white-space: nowrap; font-weight: bold; }
  table.teklif tr.toplam th {
    text-align: left;
  }
  table.teklif tr.toplam td {
    background: var(--sari);
    color: var(--sari-yazi);
    font-weight: bold;
    text-align: right;
  }
  .analiz-liste { margin: 0; padding: 0; list-style: none; }
  .analiz-liste li { padding: 1px 0; }
  .bos-uyari { color: #999; font-size: 13px; padding: 12px 0; }
</style>
</head>
<body>
<div class="kapsayici">
  <h1>OYDER Oyuncak Teklif Aracı</h1>
  <p class="altbaslik">Analizleri seçin, adet girin; teklif tablosu otomatik oluşur. "Word'e Yapıştır" ile panoya kopyalayıp Word'e Ctrl+V yapın.</p>

  <!-- Üst ayarlar -->
  <div class="kart">
    <div class="ayarlar">
      <div class="alan">
        <label for="indirim">İndirim Oranı (%)</label>
        <input type="number" id="indirim" min="0" max="100" step="1" value="0" oninput="hesapla()">
      </div>
      <div class="alan">
        <label for="kdv">KDV Oranı (%)</label>
        <input type="number" id="kdv" min="0" max="100" step="1" value="20" oninput="hesapla()">
      </div>
    </div>
  </div>

  <!-- Analiz listesi -->
  <div class="kart">
    <h2>Analizler</h2>
    <table class="liste">
      <thead>
        <tr>
          <th style="width:40px;">Seç</th>
          <th>Analiz Adı</th>
          <th class="sag" style="width:120px;">Birim Fiyat (TL)</th>
          <th class="sag" style="width:90px;">Adet</th>
          <th class="sag" style="width:130px;">Satır Toplam (TL)</th>
        </tr>
      </thead>
      <tbody id="analiz-govde"></tbody>
    </table>
  </div>

  <!-- Düzenlenebilir tablo alanları -->
  <div class="kart">
    <h2>Tablo Alanları (düzenlenebilir)</h2>
    <div class="duz-grid">
      <div class="duz-alan">
        <label for="metot">Metot</label>
        <input type="text" id="metot" value="EU Toys" oninput="hesapla()">
      </div>
      <div class="duz-alan">
        <label for="numune">Numune Miktarı</label>
        <input type="text" id="numune" value="" oninput="hesapla()">
      </div>
      <div class="duz-alan">
        <label for="servis">Servis Süresi</label>
        <input type="text" id="servis" value="5 iş günü" oninput="hesapla()">
      </div>
    </div>
  </div>

  <!-- Butonlar -->
  <div class="kart">
    <div class="butonlar">
      <button class="btn-ana" onclick="wordeKopyala()">Word'e Yapıştır (Kopyala)</button>
      <button class="btn-ikincil" onclick="temizle()">Temizle</button>
      <span class="uyari" id="uyari"></span>
    </div>
  </div>

  <!-- Teklif önizleme -->
  <div class="kart">
    <h2>Teklif Tablosu Önizleme</h2>
    <div class="onizleme-kapsayici" id="onizleme"></div>
  </div>
</div>

<script>
// Gömülü birim fiyatlar (OYDER Oyuncak listesi, kur 51, TL) — Kaynak: Fiyatlama Excel'i, "Oyuncak-oyder"
const ANALIZLER = [
  { ad: "EN 71-1 Fiziksel ve Mekanik", fiyat: 2142 },
  { ad: "EN 71-1 Yıkamalı",            fiyat: 4947 },
  { ad: "EN 71-2 Yanmazlık",           fiyat: 612 },
  { ad: "EN 71-2 Yıkamalı",            fiyat: 1224 },
  { ad: "EN 71-3 Ağır Metal",          fiyat: 2244 },
  { ad: "PAH",                         fiyat: 2244 },
  { ad: "Fitalat",                     fiyat: 1224 },
  { ad: "Azo",                         fiyat: 867 },
  { ad: "BPA",                         fiyat: 1887 },
  { ad: "Alev Geciktiriciler",         fiyat: 1887 },
  { ad: "Nitrosamin",                  fiyat: 3162 },
  { ad: "Formamide",                   fiyat: 3417 },
  { ad: "Benzen",                      fiyat: 3672 },
  { ad: "Fenol",                       fiyat: 1887 },
  { ad: "Formaldehit",                 fiyat: 1887 },
  { ad: "Preservatives",               fiyat: 2754 }
];

// Türkçe sayı biçimi (binlik nokta, yuvarlanmış)
function trSayi(n) {
  return Math.round(n).toLocaleString("tr-TR");
}

// Analiz listesini oluştur
function listeyiOlustur() {
  const govde = document.getElementById("analiz-govde");
  govde.innerHTML = "";
  ANALIZLER.forEach((a, i) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td style="text-align:center;"><input type="checkbox" id="sec-${i}" onchange="hesapla()"></td>
      <td>${a.ad}</td>
      <td class="sag">${trSayi(a.fiyat)}</td>
      <td class="sag"><input type="number" id="adet-${i}" min="0" step="1" value="1" oninput="hesapla()"></td>
      <td class="sag" id="satir-${i}">0</td>
    `;
    govde.appendChild(tr);
  });
}

function hesapla() {
  const indirim = parseFloat(document.getElementById("indirim").value) || 0;
  const kdv = parseFloat(document.getElementById("kdv").value) || 0;
  const metot = document.getElementById("metot").value.trim();
  const numune = document.getElementById("numune").value.trim();
  const servis = document.getElementById("servis").value.trim();

  let secilenler = [];
  let toplam = 0;

  ANALIZLER.forEach((a, i) => {
    const sec = document.getElementById("sec-" + i).checked;
    const adet = parseInt(document.getElementById("adet-" + i).value) || 0;
    const satirTr = document.getElementById("analiz-govde").rows[i];
    const satirHucre = document.getElementById("satir-" + i);

    if (sec && adet > 0) {
      const satirToplam = a.fiyat * adet;
      satirHucre.textContent = trSayi(satirToplam);
      satirTr.classList.remove("satir-pasif");
      toplam += satirToplam;
      secilenler.push({ ad: a.ad, adet: adet });
    } else {
      satirHucre.textContent = "0";
      satirTr.classList.toggle("satir-pasif", !sec);
    }
  });

  // İndirim
  const indirimliToplam = toplam * (1 - indirim / 100);
  const sonFiyat = indirimliToplam;

  // Önizleme tablosu
  cizTeklif(secilenler, sonFiyat, indirim, kdv, metot, numune, servis);
}

function cizTeklif(secilenler, sonFiyat, indirim, kdv, metot, numune, servis) {
  const onizleme = document.getElementById("onizleme");

  if (secilenler.length === 0) {
    onizleme.innerHTML = '<p class="bos-uyari">Henüz analiz seçilmedi. Listeden analiz işaretleyip adet girin.</p>';
    return;
  }

  const analizLi = secilenler.map(s => `<li>${s.ad}${s.adet > 1 ? " (x" + s.adet + ")" : ""}</li>`).join("");

  // Toplam satırı etiketi: indirim varsa "Proje İndirimli Toplam Fiyat", yoksa "Kdv Hariç Toplam Proje Fiyatı"
  const toplamEtiket = indirim > 0 ? "Proje İndirimli Toplam Fiyat" : "Kdv Hariç Toplam Proje Fiyatı";

  const tablo = `
    <table class="teklif" id="teklif-tablo">
      <thead>
        <tr>
          <th>Analiz Adı</th>
          <th>Kdv Hariç Toplam Fiyat</th>
          <th>Metot</th>
          <th>Numune Miktarı</th>
          <th>Servis Süresi</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><ul class="analiz-liste">${analizLi}</ul></td>
          <td class="fiyat">${trSayi(sonFiyat)} TL</td>
          <td>${metot}</td>
          <td>${numune}</td>
          <td style="text-align:center;">${servis}</td>
        </tr>
        <tr class="toplam">
          <th>${toplamEtiket}</th>
          <td colspan="4">${trSayi(sonFiyat)} TL + Kdv</td>
        </tr>
      </tbody>
    </table>
  `;
  onizleme.innerHTML = tablo;
}

function wordeKopyala() {
  const tablo = document.getElementById("teklif-tablo");
  const uyari = document.getElementById("uyari");
  if (!tablo) {
    uyari.textContent = "Önce analiz seçin.";
    uyari.style.color = "#c62828";
    setTimeout(() => { uyari.textContent = ""; }, 2500);
    return;
  }

  // Word'e biçimle yapışması için inline stilli kopya oluştur
  const klon = tablo.cloneNode(true);
  // Inline stil enjekte et (Word panodan stil okur)
  klon.querySelectorAll("th").forEach(th => {
    const ust = th.closest("tr").classList.contains("toplam");
    th.setAttribute("style", "border:1px solid #BA7517;padding:8px 10px;background:#FFC000;color:#412402;font-weight:bold;text-align:" + (ust ? "left" : "center") + ";font-family:Arial,sans-serif;font-size:13px;");
  });
  klon.querySelectorAll("td").forEach(td => {
    const ust = td.closest("tr").classList.contains("toplam");
    let stil = "border:1px solid #BA7517;padding:8px 10px;font-family:Arial,sans-serif;font-size:13px;vertical-align:top;";
    if (ust) stil += "background:#FFC000;color:#412402;font-weight:bold;text-align:right;";
    else if (td.classList.contains("fiyat")) stil += "text-align:right;font-weight:bold;white-space:nowrap;";
    td.setAttribute("style", stil);
  });
  klon.setAttribute("style", "border-collapse:collapse;font-family:Arial,sans-serif;");

  const html = klon.outerHTML;
  const blob = new Blob([html], { type: "text/html" });

  try {
    const veri = [new ClipboardItem({ "text/html": blob })];
    navigator.clipboard.write(veri).then(() => {
      uyari.textContent = "Kopyalandı! Word'e Ctrl+V yapın.";
      uyari.style.color = "#2e7d32";
      setTimeout(() => { uyari.textContent = ""; }, 3000);
    }).catch(() => yedekKopyala(klon, uyari));
  } catch (e) {
    yedekKopyala(klon, uyari);
  }
}

// Eski tarayıcılar için yedek kopyalama
function yedekKopyala(klon, uyari) {
  const secim = window.getSelection();
  const aralik = document.createRange();
  const gecici = document.createElement("div");
  gecici.appendChild(klon);
  gecici.style.position = "fixed";
  gecici.style.left = "-9999px";
  document.body.appendChild(gecici);
  aralik.selectNodeContents(gecici);
  secim.removeAllRanges();
  secim.addRange(aralik);
  try {
    document.execCommand("copy");
    uyari.textContent = "Kopyalandı! Word'e Ctrl+V yapın.";
    uyari.style.color = "#2e7d32";
  } catch (e) {
    uyari.textContent = "Kopyalama başarısız oldu.";
    uyari.style.color = "#c62828";
  }
  secim.removeAllRanges();
  document.body.removeChild(gecici);
  setTimeout(() => { uyari.textContent = ""; }, 3000);
}

function temizle() {
  ANALIZLER.forEach((a, i) => {
    document.getElementById("sec-" + i).checked = false;
    document.getElementById("adet-" + i).value = 1;
  });
  document.getElementById("indirim").value = 0;
  document.getElementById("kdv").value = 20;
  document.getElementById("numune").value = "";
  document.getElementById("servis").value = "5 iş günü";
  document.getElementById("metot").value = "EU Toys";
  hesapla();
}

// Başlat
listeyiOlustur();
hesapla();
</script>
</body>
</html>
