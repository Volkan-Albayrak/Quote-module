<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OYDER Oyuncak Teklif Aracı</title>
<style>
  :root {
    --sari: #FFC000;
    --sari-kenar: #BA7517;
    --sari-yazi: #412402;
    --koyu: #1d1d1d;
    --koyu2: #2b2b2b;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
    color: #222;
  }

  /* Üst bar */
  .ust-bar {
    background: var(--koyu);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    padding: 14px 24px;
  }
  .ust-sol { display: flex; align-items: center; gap: 14px; }
  .logo { font-size: 20px; font-weight: 700; font-style: italic; letter-spacing: 0.5px; }
  .ayrac { color: #666; font-size: 18px; }
  .baslik { font-size: 16px; font-weight: 600; }
  .ust-sag { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .ust-sag label { font-size: 13px; color: #ccc; }

  .doviz-toggle {
    display: flex;
    background: var(--sari);
    border-radius: 6px;
    padding: 3px;
    gap: 3px;
  }
  .doviz-toggle button {
    border: none;
    background: transparent;
    color: var(--sari-yazi);
    font-weight: 700;
    font-size: 13px;
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
  }
  .doviz-toggle button.aktif {
    background: var(--koyu);
    color: #fff;
  }

  .btn-tcmb {
    background: var(--sari);
    color: var(--sari-yazi);
    border: none;
    font-weight: 700;
    font-size: 13px;
    padding: 9px 14px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-tcmb:hover { background: #e6ad00; }

  #kur {
    width: 70px;
    padding: 8px 9px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    text-align: center;
  }
  .kur-aciklama { font-size: 11px; color: #999; max-width: 160px; line-height: 1.3; }

  /* Ana içerik */
  .ana-icerik {
    display: flex;
    gap: 18px;
    padding: 18px 24px;
    align-items: flex-start;
  }
  .panel {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
  }
  .panel-baslik {
    background: var(--koyu2);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 12px 18px;
    text-transform: uppercase;
  }
  .panel-govde { padding: 16px 18px; }

  .panel-analiz { flex: 2 1 0; min-width: 0; }
  .panel-teklif { flex: 1 1 0; min-width: 280px; }

  /* Analiz listesi - 2 sütun */
  .analiz-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 28px;
  }
  .analiz-satir {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .analiz-satir input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
  .analiz-ad { flex: 1 1 auto; font-size: 14px; }
  .analiz-fiyat { font-size: 13px; color: #999; min-width: 80px; text-align: right; }
  .analiz-satir.secili .analiz-fiyat { color: #333; font-weight: 600; }
  .analiz-adet {
    width: 52px;
    padding: 6px 7px;
    border: 1px solid #ccc;
    border-radius: 5px;
    text-align: center;
    font-size: 13px;
  }

  /* Teklif tablosu paneli */
  .teklif-butonlar { display: flex; gap: 10px; margin-bottom: 14px; }
  button.btn-ana {
    background: var(--sari); color: var(--sari-yazi); border: none;
    padding: 10px 18px; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  button.btn-ana:hover { background: #e6ad00; }
  button.btn-ikincil {
    background: var(--koyu2); color: #fff; border: none;
    padding: 10px 18px; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  button.btn-ikincil:hover { background: #444; }
  .uyari { display: block; margin-top: 8px; font-size: 13px; color: #2e7d32; }

  .bos-uyari { color: #999; font-size: 13px; }
  .bos-uyari p { margin: 0 0 10px; }

  .teklif-ozet { font-size: 13px; }
  .teklif-ozet .analiz-liste { margin: 0 0 14px; padding: 0 0 0 18px; }
  .teklif-ozet .analiz-liste li { padding: 2px 0; }
  .duz-alan { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .duz-alan label { font-size: 12px; color: #555; font-weight: 600; }
  .duz-alan input {
    padding: 7px 9px; border: 1px solid #ccc; border-radius: 5px; font-size: 13px;
  }
  .teklif-fiyat {
    background: var(--sari); color: var(--sari-yazi); font-weight: 700;
    border-radius: 6px; padding: 10px 12px; text-align: right; font-size: 14px; margin-top: 10px;
  }

  /* Fiyatlandırma */
  .panel-fiyat { margin: 0 24px 24px; }
  .fiyat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }
  .fiyat-alan { display: flex; flex-direction: column; gap: 6px; }
  .fiyat-alan label { font-size: 12px; color: #555; font-weight: 600; }
  .fiyat-alan input {
    padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px;
  }
  .fiyat-alan input[readonly] { background: #f9f9f9; color: #333; font-weight: 600; }
  #indirimliFiyat { border: 1px solid var(--sari-kenar); background: #fff8e6; }

  /* Yazdırılabilir/kopyalanabilir teklif tablosu (panodaki Word çıktısı) */
  table.teklif { border-collapse: collapse; width: 100%; font-family: "Segoe UI", Arial, sans-serif; }
  table.teklif th, table.teklif td {
    border: 1px solid var(--sari-kenar);
    padding: 8px 10px;
    font-size: 13px;
    vertical-align: top;
  }
  table.teklif th {
    background: var(--sari);
    color: var(--sari-yazi);
    font-weight: bold;
    text-align: center;
  }
  table.teklif td.fiyat { text-align: right; white-space: nowrap; font-weight: bold; }
  table.teklif tr.toplam th { text-align: left; }
  table.teklif tr.toplam td {
    background: var(--sari);
    color: var(--sari-yazi);
    font-weight: bold;
    text-align: right;
  }
  #kopyalama-alani { position: absolute; left: -9999px; top: -9999px; }

  @media (max-width: 900px) {
    .ana-icerik { flex-direction: column; }
    .analiz-grid { grid-template-columns: 1fr; }
    .fiyat-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Üst bar -->
<div class="ust-bar">
  <div class="ust-sol">
    <span class="logo">intertek<span style="color:var(--sari);">.</span></span>
    <span class="ayrac">|</span>
    <span class="baslik">OYDER Oyuncak Teklif Aracı</span>
  </div>
  <div class="ust-sag">
    <label>Para Birimi:</label>
    <div class="doviz-toggle">
      <button id="btn-tl" class="aktif" onclick="dovizSec('TL')">TL</button>
      <button id="btn-eur" onclick="dovizSec('EUR')">EUR</button>
    </div>
    <button class="btn-tcmb" onclick="tcmbKurGetir()">TCMB Euro Satış</button>
    <input type="number" id="kur" min="0" step="0.01" value="51" oninput="hesapla()">
    <span class="kur-aciklama" id="kur-aciklama">Kur (€→TL) · TCMB satış, 0,5 yukarı</span>
  </div>
</div>

<!-- Ana içerik -->
<div class="ana-icerik">

  <!-- Analiz seçimi -->
  <div class="panel panel-analiz">
    <div class="panel-baslik">Analiz Seçimi</div>
    <div class="panel-govde">
      <div class="analiz-grid" id="analiz-grid"></div>
    </div>
  </div>

  <!-- Teklif tablosu -->
  <div class="panel panel-teklif">
    <div class="panel-baslik">Teklif Tablosu</div>
    <div class="panel-govde">
      <div class="teklif-butonlar">
        <button class="btn-ana" onclick="wordeKopyala()">Word'e Yapıştır</button>
        <button class="btn-ikincil" onclick="temizle()">Sıfırla</button>
      </div>
      <div id="teklif-icerik"></div>
      <span class="uyari" id="uyari"></span>
    </div>
  </div>

</div>

<!-- Fiyatlandırma -->
<div class="panel panel-fiyat">
  <div class="panel-baslik">Fiyatlandırma</div>
  <div class="panel-govde">
    <div class="fiyat-grid">
      <div class="fiyat-alan">
        <label for="genelToplam">Genel Toplam</label>
        <input type="text" id="genelToplam" readonly>
      </div>
      <div class="fiyat-alan">
        <label for="indirim">İndirim (%)</label>
        <input type="number" id="indirim" min="0" max="100" step="1" value="0" oninput="hesapla()">
      </div>
      <div class="fiyat-alan">
        <label for="indirimliFiyat">İndirimli Proje Fiyatı</label>
        <input type="text" id="indirimliFiyat" readonly>
      </div>
    </div>
  </div>
</div>

<!-- Word'e kopyalama için gizli tam tablo -->
<div id="kopyalama-alani"></div>

<script>
// Gömülü birim fiyatlar (OYDER Oyuncak listesi, kur 51, TL) — Kaynak: Fiyatlama Excel'i, "Oyuncak-oyder"
const ANALIZLER = [
  { ad: "EN 71-1 Fiziksel ve Mekanik", fiyat: 2142 },
  { ad: "EN 71-1 Yıkamalı",            fiyat: 4947 },
  { ad: "EN 71-2 Yanmazlık",           fiyat: 612 },
  { ad: "EN 71-2 Yıkamalı",            fiyat: 1224 },
  { ad: "EN 71-3 Ağır Metal",          fiyat: 2244 },
  { ad: "PAH",                         fiyat: 2244 },
  { ad: "Fitalat",                     fiyat: 1224 },
  { ad: "Azo",                         fiyat: 867 },
  { ad: "BPA",                         fiyat: 1887 },
  { ad: "Alev Geciktiriciler",         fiyat: 1887 },
  { ad: "Nitrosamin",                  fiyat: 3162 },
  { ad: "Formamide",                   fiyat: 3417 },
  { ad: "Benzen",                      fiyat: 3672 },
  { ad: "Fenol",                       fiyat: 1887 },
  { ad: "Formaldehit",                 fiyat: 1887 },
  { ad: "Preservatives",               fiyat: 2754 }
];

let dovizBirimi = "TL";

// Türkçe sayı biçimi (binlik nokta, yuvarlanmış)
function trSayi(n) {
  return Math.round(n).toLocaleString("tr-TR");
}

function kurDegeri() {
  return parseFloat(document.getElementById("kur").value) || 1;
}

// TL tutarı seçili para birimine çevirip etiketli string döndürür
function fiyatGoster(tlTutar) {
  if (dovizBirimi === "EUR") {
    return trSayi(tlTutar / kurDegeri()) + " EUR";
  }
  return trSayi(tlTutar) + " TL";
}

function dovizSec(birim) {
  dovizBirimi = birim;
  document.getElementById("btn-tl").classList.toggle("aktif", birim === "TL");
  document.getElementById("btn-eur").classList.toggle("aktif", birim === "EUR");
  hesapla();
}

// TCMB'den Euro satış kurunu alır ve 0,5'in üstüne yuvarlar (örn. 53.7123 -> 54, 53.2512 -> 53.5)
const TCMB_URL = "https://www.tcmb.gov.tr/kurlar/today.xml";

// TCMB CORS başlığı göndermediği için sırayla doğrudan ve çeşitli proxy'ler denenir
const TCMB_DENEMELERI = [
  () => fetch(TCMB_URL).then(r => r.text()),
  () => fetch("https://corsproxy.io/?url=" + encodeURIComponent(TCMB_URL)).then(r => r.text()),
  () => fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(TCMB_URL)).then(r => r.text()),
  () => fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(TCMB_URL)).then(r => r.json()).then(j => j.contents),
  () => fetch("https://api.codetabs.com/v1/proxy?quest=" + TCMB_URL).then(r => r.text())
];

function tcmbKuruIsle(metin) {
  const xml = new DOMParser().parseFromString(metin, "text/xml");
  const eur = xml.querySelector('Currency[CurrencyCode="EUR"] ForexSelling, Currency[CurrencyCode="EUR"] BanknoteSelling');
  if (!eur || !eur.textContent.trim()) throw new Error("Kur bulunamadı");
  const satis = parseFloat(eur.textContent.replace(",", "."));
  return Math.ceil(satis * 2) / 2; // 0,5'in üstüne yuvarla
}

// Denemeleri sırayla yapar, ilk başarılı olanın sonucunu döndürür
function sirayleDene(denemeler, i) {
  i = i || 0;
  if (i >= denemeler.length) return Promise.reject(new Error("Tüm denemeler başarısız"));
  return denemeler[i]()
    .then(tcmbKuruIsle)
    .catch(() => sirayleDene(denemeler, i + 1));
}

function tcmbKurGetir() {
  const uyari = document.getElementById("uyari");

  sirayleDene(TCMB_DENEMELERI)
    .then(yuvarlanmis => {
      document.getElementById("kur").value = yuvarlanmis;
      localStorage.setItem("tcmbKur", JSON.stringify({ deger: yuvarlanmis, tarih: new Date().toISOString() }));
      hesapla();
      uyari.textContent = "TCMB kuru güncellendi: " + yuvarlanmis;
      uyari.style.color = "#2e7d32";
      setTimeout(() => { uyari.textContent = ""; }, 3000);
    })
    .catch(() => {
      const kayitli = localStorage.getItem("tcmbKur");
      if (kayitli) {
        const veri = JSON.parse(kayitli);
        document.getElementById("kur").value = veri.deger;
        hesapla();
        const tarih = new Date(veri.tarih).toLocaleString("tr-TR");
        uyari.textContent = "TCMB kuru otomatik alınamadı. Son bilinen kur (" + tarih + ") kullanılıyor, gerekirse manuel düzeltin.";
      } else {
        uyari.textContent = "TCMB kuru otomatik alınamadı, lütfen manuel girin.";
      }
      uyari.style.color = "#c62828";
      setTimeout(() => { uyari.textContent = ""; }, 5000);
    });
}

// Analiz listesini oluştur
function listeyiOlustur() {
  const grid = document.getElementById("analiz-grid");
  grid.innerHTML = "";
  ANALIZLER.forEach((a, i) => {
    const satir = document.createElement("div");
    satir.className = "analiz-satir";
    satir.id = "satir-" + i;
    satir.innerHTML = `
      <input type="checkbox" id="sec-${i}" onchange="hesapla()">
      <span class="analiz-ad">${a.ad}</span>
      <span class="analiz-fiyat" id="fiyat-${i}"></span>
      <input type="number" class="analiz-adet" id="adet-${i}" min="0" step="1" value="1" oninput="hesapla()">
    `;
    grid.appendChild(satir);
  });
}

function hesapla() {
  const indirim = parseFloat(document.getElementById("indirim").value) || 0;

  let secilenler = [];
  let toplam = 0;

  ANALIZLER.forEach((a, i) => {
    const sec = document.getElementById("sec-" + i).checked;
    const adet = parseInt(document.getElementById("adet-" + i).value) || 0;
    const satir = document.getElementById("satir-" + i);
    const fiyatHucre = document.getElementById("fiyat-" + i);

    satir.classList.toggle("secili", sec);
    fiyatHucre.textContent = fiyatGoster(a.fiyat);

    if (sec && adet > 0) {
      toplam += a.fiyat * adet;
      secilenler.push({ ad: a.ad, adet: adet, fiyat: a.fiyat });
    }
  });

  const indirimliToplam = toplam * (1 - indirim / 100);

  document.getElementById("genelToplam").value = fiyatGoster(toplam);
  document.getElementById("indirimliFiyat").value = fiyatGoster(indirimliToplam);

  cizTeklif(secilenler, indirimliToplam, indirim);
}

function cizTeklif(secilenler, sonFiyat, indirim) {
  const icerik = document.getElementById("teklif-icerik");

  if (secilenler.length === 0) {
    icerik.innerHTML = `
      <div class="bos-uyari">
        <p>Henüz analiz seçilmedi. Listeden analiz işaretleyip adet girin.</p>
        <p>Metot / Numune Miktarı / Servis Süresi alanlarını tablo üzerinde düzenleyebilirsiniz.</p>
      </div>`;
    document.getElementById("kopyalama-alani").innerHTML = "";
    return;
  }

  const analizLi = secilenler.map(s => `<li>${s.ad}${s.adet > 1 ? " (x" + s.adet + ")" : ""}</li>`).join("");

  // Önceki değerleri korumak için varsa mevcut input değerlerini al
  const eskiMetot = document.getElementById("metot");
  const eskiNumune = document.getElementById("numune");
  const eskiServis = document.getElementById("servis");
  const metotDeger = eskiMetot ? eskiMetot.value : "EU Toys";
  const numuneDeger = eskiNumune ? eskiNumune.value : "";
  const servisDeger = eskiServis ? eskiServis.value : "5 iş günü";

  icerik.innerHTML = `
    <div class="teklif-ozet">
      <ul class="analiz-liste">${analizLi}</ul>
      <div class="duz-alan">
        <label for="metot">Metot</label>
        <input type="text" id="metot" value="${metotDeger}" oninput="kopyaTablosunuGuncelle()">
      </div>
      <div class="duz-alan">
        <label for="numune">Numune Miktarı</label>
        <input type="text" id="numune" value="${numuneDeger}" oninput="kopyaTablosunuGuncelle()">
      </div>
      <div class="duz-alan">
        <label for="servis">Servis Süresi</label>
        <input type="text" id="servis" value="${servisDeger}" oninput="kopyaTablosunuGuncelle()">
      </div>
      <div class="teklif-fiyat">${indirim > 0 ? "İndirimli Proje Fiyatı" : "Toplam Proje Fiyatı"}: ${fiyatGoster(sonFiyat)} + Kdv</div>
    </div>
  `;

  kopyaTablosunuGuncelle(analizLi, sonFiyat, indirim);
}

// Word'e kopyalanacak biçimli tabloyu (gizli alanda) günceller
function kopyaTablosunuGuncelle(analizLi, sonFiyat, indirim) {
  const kopyalama = document.getElementById("kopyalama-alani");

  if (analizLi === undefined) {
    // input değişiminden çağrıldıysa son hesaplanan değerleri yeniden üret
    hesapla();
    return;
  }

  const metot = document.getElementById("metot").value.trim();
  const numune = document.getElementById("numune").value.trim();
  const servis = document.getElementById("servis").value.trim();
  const toplamEtiket = indirim > 0 ? "Proje İndirimli Toplam Fiyat" : "Kdv Hariç Toplam Proje Fiyatı";

  kopyalama.innerHTML = `
    <table class="teklif" id="teklif-tablo">
      <thead>
        <tr>
          <th>Analiz Adı</th>
          <th>Kdv Hariç Toplam Fiyat</th>
          <th>Metot</th>
          <th>Numune Miktarı</th>
          <th>Servis Süresi</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><ul class="analiz-liste">${analizLi}</ul></td>
          <td class="fiyat">${fiyatGoster(sonFiyat)}</td>
          <td>${metot}</td>
          <td>${numune}</td>
          <td style="text-align:center;">${servis}</td>
        </tr>
        <tr class="toplam">
          <th>${toplamEtiket}</th>
          <td colspan="4">${fiyatGoster(sonFiyat)} + Kdv</td>
        </tr>
      </tbody>
    </table>
  `;
}

function wordeKopyala() {
  const tablo = document.getElementById("teklif-tablo");
  const uyari = document.getElementById("uyari");
  if (!tablo) {
    uyari.textContent = "Önce analiz seçin.";
    uyari.style.color = "#c62828";
    setTimeout(() => { uyari.textContent = ""; }, 2500);
    return;
  }

  // Word'e biçimle yapışması için inline stilli kopya oluştur
  const klon = tablo.cloneNode(true);
  klon.querySelectorAll("th").forEach(th => {
    const ust = th.closest("tr").classList.contains("toplam");
    th.setAttribute("style", "border:1px solid #BA7517;padding:8px 10px;background:#FFC000;color:#412402;font-weight:bold;text-align:" + (ust ? "left" : "center") + ";font-family:Arial,sans-serif;font-size:13px;");
  });
  klon.querySelectorAll("td").forEach(td => {
    const ust = td.closest("tr").classList.contains("toplam");
    let stil = "border:1px solid #BA7517;padding:8px 10px;font-family:Arial,sans-serif;font-size:13px;vertical-align:top;";
    if (ust) stil += "background:#FFC000;color:#412402;font-weight:bold;text-align:right;";
    else if (td.classList.contains("fiyat")) stil += "text-align:right;font-weight:bold;white-space:nowrap;";
    td.setAttribute("style", stil);
  });
  klon.setAttribute("style", "border-collapse:collapse;font-family:Arial,sans-serif;");

  const html = klon.outerHTML;
  const blob = new Blob([html], { type: "text/html" });

  try {
    const veri = [new ClipboardItem({ "text/html": blob })];
    navigator.clipboard.write(veri).then(() => {
      uyari.textContent = "Kopyalandı! Word'e Ctrl+V yapın.";
      uyari.style.color = "#2e7d32";
      setTimeout(() => { uyari.textContent = ""; }, 3000);
    }).catch(() => yedekKopyala(klon, uyari));
  } catch (e) {
    yedekKopyala(klon, uyari);
  }
}

// Eski tarayıcılar için yedek kopyalama
function yedekKopyala(klon, uyari) {
  const secim = window.getSelection();
  const aralik = document.createRange();
  const gecici = document.createElement("div");
  gecici.appendChild(klon);
  gecici.style.position = "fixed";
  gecici.style.left = "-9999px";
  document.body.appendChild(gecici);
  aralik.selectNodeContents(gecici);
  secim.removeAllRanges();
  secim.addRange(aralik);
  try {
    document.execCommand("copy");
    uyari.textContent = "Kopyalandı! Word'e Ctrl+V yapın.";
    uyari.style.color = "#2e7d32";
  } catch (e) {
    uyari.textContent = "Kopyalama başarısız oldu.";
    uyari.style.color = "#c62828";
  }
  secim.removeAllRanges();
  document.body.removeChild(gecici);
  setTimeout(() => { uyari.textContent = ""; }, 3000);
}

function temizle() {
  ANALIZLER.forEach((a, i) => {
    document.getElementById("sec-" + i).checked = false;
    document.getElementById("adet-" + i).value = 1;
  });
  document.getElementById("indirim").value = 0;
  hesapla();
}

// Başlat
listeyiOlustur();
hesapla();
tcmbKurGetir();
</script>
